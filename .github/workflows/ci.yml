name: CI

on:
  pull_request:
    branches:
      - staging
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Build project
        run: npm run build

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Check for dist/ changes in PR
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...${{ github.sha }})
          if echo "$CHANGED_FILES" | grep -q '^dist/'; then
            echo "❌ ERROR: dist/ folder should not be committed!"
            echo "Changed files in dist/:"
            echo "$CHANGED_FILES" | grep '^dist/'
            echo ""
            echo "Please remove dist/ changes from your PR."
            echo "The dist/ folder is built automatically on the server."
            exit 1
          fi
          echo "✅ No dist/ changes detected - PR is clean"
